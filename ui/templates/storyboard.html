{% extends "base.html" %}
{% block title %}Storyboard Review — Babylon Studio{% endblock %}

{% block content %}
<div id="storyboard-root">

  <!-- Controls bar -->
  <div class="flex items-center gap-4 mb-6 flex-wrap">
    <h2 class="text-lg font-semibold text-gray-100">Storyboard Review</h2>

    <select id="sb-chapter-select"
            onchange="Storyboard.load()"
            class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm text-gray-200 focus:outline-none focus:ring-1 focus:ring-babylon-500">
      <option value="">Select chapter...</option>
    </select>

    <select id="sb-scene-select"
            onchange="Storyboard.loadScene()"
            class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm text-gray-200 focus:outline-none focus:ring-1 focus:ring-babylon-500">
      <option value="">All scenes</option>
    </select>

    <div class="flex-1"></div>

    <button id="sb-play-chapter-btn"
            onclick="Storyboard.playChapter()"
            class="bg-babylon-700 hover:bg-babylon-600 text-white text-sm px-4 py-1.5 rounded transition-colors flex items-center gap-1">
      &#9654; Play Chapter (Space)
    </button>
    <button onclick="Storyboard.stopChapter()"
            class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-sm px-3 py-1.5 rounded transition-colors">
      &#9632; Stop
    </button>

    <span id="sb-counter" class="text-xs text-gray-500"></span>

    <button id="sb-aspect-btn"
            onclick="Storyboard.toggleAspect()"
            class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-sm px-3 py-1.5 rounded transition-colors"
            title="Toggle 16:9 / 9:16 aspect ratio (V)">
      &#x25ad; 16:9
    </button>

    <div class="flex items-center gap-1 text-xs text-gray-500">
      <kbd class="px-1.5 py-0.5 bg-gray-800 rounded border border-gray-700">&larr;&rarr;</kbd> nav
      <kbd class="px-1.5 py-0.5 bg-gray-800 rounded border border-gray-700 ml-2">A</kbd> approve
      <kbd class="px-1.5 py-0.5 bg-gray-800 rounded border border-gray-700 ml-1">R</kbd> reject
      <kbd class="px-1.5 py-0.5 bg-gray-800 rounded border border-gray-700 ml-2">V</kbd> aspect
      <kbd class="px-1.5 py-0.5 bg-gray-800 rounded border border-gray-700 ml-2">Space</kbd> play
    </div>
  </div>

  <!-- Common seed controls -->
  <div id="sb-common-seed-bar" class="flex items-center gap-3 mb-4 px-3 py-2 bg-gray-900/60 rounded-lg border border-gray-800">
    <label class="flex items-center gap-2 cursor-pointer select-none">
      <input type="checkbox" id="sb-common-seed-toggle"
             onchange="Storyboard.toggleCommonSeed()"
             class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-yellow-500 focus:ring-yellow-600 focus:ring-offset-0 cursor-pointer" />
      <span class="text-xs font-medium text-yellow-400">Common Seed</span>
    </label>
    <input type="number" id="sb-common-seed-value"
           placeholder="Enter seed..."
           disabled
           class="w-36 bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-yellow-300
                  placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-yellow-600
                  disabled:opacity-40 disabled:cursor-not-allowed
                  [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" />
    <button id="sb-common-seed-save"
            onclick="Storyboard.saveCommonSeed()"
            disabled
            class="text-xs px-2 py-1 rounded bg-yellow-800 hover:bg-yellow-700 text-yellow-200
                   transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      Save
    </button>
    <button onclick="Storyboard.randomizeCommonSeed()"
            id="sb-common-seed-random"
            disabled
            class="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-300
                   transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
            title="Generate a random seed">
      &#x1f3b2; Random
    </button>
    <span id="sb-common-seed-status" class="text-[10px] text-gray-600 ml-1"></span>
  </div>

  <!-- Chapter playback progress bar -->
  <div id="sb-chapter-progress" style="display:none" class="mb-4">
    <div class="flex items-center gap-2 mb-1">
      <span id="sb-chapter-progress-label" class="text-xs text-gray-400"></span>
    </div>
    <div class="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden">
      <div id="sb-chapter-progress-fill" class="h-full bg-babylon-500 rounded-full transition-all duration-300" style="width:0%"></div>
    </div>
  </div>

  <!-- Shot viewer -->
  <div id="sb-viewer" class="flex gap-6">
    <!-- Main area: image + screenplay context -->
    <div class="flex-1 min-w-0">
      <!-- Image + Shot header -->
      <div id="sb-image-container" class="bg-gray-900 rounded-lg overflow-hidden border border-gray-800 aspect-video flex items-center justify-center">
        <div class="text-gray-600">Select a chapter to begin review</div>
      </div>

      <!-- Shot info + Screenplay context -->
      <div id="sb-shot-info" class="mt-3"></div>
    </div>

    <!-- Shot strip (vertical) -->
    <div id="sb-filmstrip" class="w-36 flex-shrink-0 space-y-2 max-h-[70vh] overflow-y-auto">
    </div>
  </div>

</div>
{% endblock %}

{% block page_scripts %}
<script src="{{ url_for('static', filename='js/storyboard.js') }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => Storyboard.init('{{ slug }}'));
</script>
{% endblock %}
